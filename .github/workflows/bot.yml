name: Telegram Bot

on:
  schedule:
    - cron: "0 */3 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - run: npm install axios

      - name: Validate secrets
        run: |
          test -n "$BOT_TOKEN" || { echo "BOT_TOKEN nao configurado"; exit 1; }
          test -n "$CHAT_ID" || { echo "CHAT_ID nao configurado"; exit 1; }
          test -n "$SERPAPI_KEY" || { echo "SERPAPI_KEY nao configurado"; exit 1; }
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Run bot
        run: node index.js
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          SEARCH_QUERY: "desenvolvedor de software brasil"
          SEARCH_LOCATION: "Brazil"
          MAX_JOBS: "5"
          DRY_RUN: "false"
          SHORTEN_URLS: "true"
