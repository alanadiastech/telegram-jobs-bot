name: Telegram Courses Bot

on:
  schedule:
    - cron: "0 15 * * *"
  workflow_dispatch:

jobs:
  run-courses-bot:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

    steps:
      - uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: "pnpm"
          cache-dependency-path: "pnpm-lock.yaml"

      - run: pnpm install --frozen-lockfile

      - name: Restore dedup cache
        uses: actions/cache/restore@v4
        with:
          path: .cache/posted-courses.json
          key: posted-courses-${{ github.ref_name }}-${{ github.run_id }}
          restore-keys: |
            posted-courses-${{ github.ref_name }}-

      - name: Validate secrets
        run: |
          test -n "$BOT_TOKEN" || { echo "BOT_TOKEN nao configurado"; exit 1; }
          test -n "$CHAT_ID" || { echo "CHAT_ID nao configurado"; exit 1; }
          test -n "$SERPAPI_KEY" || { echo "SERPAPI_KEY nao configurado"; exit 1; }
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}

      - name: Run bot
        run: pnpm start
        env:
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
          CHAT_ID: ${{ secrets.CHAT_ID }}
          SERPAPI_KEY: ${{ secrets.SERPAPI_KEY }}
          CONTENT_TYPE: "courses"
          COURSES_QUERY: "curso gratuito ti brasil"
          SEARCH_LOCATION: "Brazil"
          MAX_COURSES: "3"
          DRY_RUN: "false"
          SHORTEN_URLS: "true"
          STATE_FILE: ".cache/posted-courses.json"

      - name: Save dedup cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: .cache/posted-courses.json
          key: posted-courses-${{ github.ref_name }}-${{ github.run_id }}
